{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kavod School{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar {
            background: linear-gradient(90deg, #2563eb 0%, #3b82f6 50%, #1d4ed8 100%);
        }
        .navbar-brand img {
            border-radius: 50%;
            margin-right: 8px;
        }
        .nav-link {
            font-weight: 500;
        }
        .nav-link:hover {
            color: #ffeb3b !important;
        }
    </style>
</head>
<body>

<!-- 🌐 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
  <div class="container">
    <!-- Logo & Brand -->
    <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'home' %}">
      <img src="{% static 'images/logo.png' %}" width="40" height="40" alt="Logo">
      Kavod School
    </a>

    <!-- Hamburger Button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Links -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'admissions' %}">Admissions</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'academics' %}">Academics</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>

        <!-- Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="portalDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Portal
          </a>
          <ul class="dropdown-menu" aria-labelledby="portalDropdown">
            <li><a class="dropdown-item" href="#">Student Login</a></li>
            <li><a class="dropdown-item" href="#">Staff Login</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
<!-- 🌐 End Navbar -->

<!-- Page Content -->
<main class="container mt-5">
  {% block content %}
  {% endblock %}
</main>

<!-- Footer -->
<footer class="text-center text-white py-3 mt-5" style="background-color:#1d4ed8;">
  <p class="mb-0">© 2025 Kavod School. All Rights Reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
